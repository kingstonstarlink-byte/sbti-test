        function startQuiz() {
            currentIdx = 0;
            // 重置分数
            for(let key in scores) scores[key] = 0;
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentIdx];
            // 更新进度条
            const progressPercent = ((currentIdx) / questions.length) * 100;
            document.getElementById('progress').style.width = `${progressPercent}%`;

            let html = `<div class="question-text">${q.title}</div>`;
            q.options.forEach((opt, idx) => {
                html += `<button class="btn" onclick="selectOption(${idx})">${opt.text}</button>`;
            });
            document.getElementById('game-box').innerHTML = html;
        }

        function selectOption(idx) {
            const q = questions[currentIdx];
            const opt = q.options[idx];
            scores[opt.type]++;
            
            // 实时更新进度条
            const progressPercent = ((currentIdx + 1) / questions.length) * 100;
            document.getElementById('progress').style.width = `${progressPercent}%`;

            let html = `<div class="question-text">${q.title}</div>`;
            html += `<div style="color: #aaa; margin-bottom: 10px;">你的选择: ${opt.text.split('.')[0]}</div>`;
            html += `<div id="feedback-box"><span class="fb-text">【考官点评】：</span><span style="color:#e0e0e0;">${opt.fb}</span></div>`;
            
            if (currentIdx < questions.length - 1) {
                html += `<button class="btn next-btn" onclick="nextQuestion()">下一题 (${currentIdx + 2}/${questions.length}) ➡️</button>`;
            } else {
                html += `<button class="btn next-btn" style="background:#ff4757;" onclick="calculateResult()">⚡ 查看30题终极精神鉴定报告 ⚡</button>`;
            }
            document.getElementById('game-box').innerHTML = html;
        }

        function nextQuestion() {
            currentIdx++;
            showQuestion();
        }

            document.getElementById('progress').style.width = '100%';
            // 计算权重最高的人格
            let maxType = 'DEAD';
            let maxScore = -1;

            resultHtml += `<button class="btn start-btn" onclick="location.reload()">不服气？重新受刑</button>`;
